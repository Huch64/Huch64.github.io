<h1 class="sronly">Haocheng Wang — architect turned applied-AI researcher</h1>
<noscript>
<p>An explorer drawn to structured, constraint-guided learning. M.Computing in Applied AI, Nanyang Technological University, Singapore. Formerly Project Architect at Yanfei Architects (2018–24). <a href="https://github.com/Huch64">GitHub</a>.</p>
<p>Selected work — PRISM: sentence-level citations for arXiv papers, a generate-then-locate agent. My Little Bedroom: an RL agent that furnishes rooms from reward alone. The Marriage Trap: a fairness audit of the 1994 UCI Adult Census. Unfolding London: clustering London households into energy archetypes from smart-meter data. The Unasked: knowledge distillation for non-intrusive depression screening. Rush Hour: SimpleRNN traffic forecasting. Fluctuating Zone: GIS and social-media mining of a river's water-level zone. Residential Study: hundreds of floor plans superimposed. Xianlin School: a built 62,000 m² school (First Prize). Ski Tower: a vertical boarding complex.</p>
</noscript>

const DESC={
 '01':'LLM answers about papers are easy to doubt and hard to verify. PRISM runs a five-agent pipeline that writes an answer and then pins every claim to the exact source sentence, behind five layers of guardrails — so each claim links back to where it came from, and all 13 safety probes pass.',
 '02':'A furnished room has no single “correct” layout to imitate, so there is nothing to supervise on. Instead a MaskablePPO agent learns from a reward encoding architectural common sense — accessibility, privacy, circulation — with zero demonstrations, reaching 2.4× a random policy and growing its own spatial grammar that carries over to unseen rooms.',
 '03':'A data-governance study of the 1994 UCI Adult Census: profile, clean, explore and mine the data, treating ML models as evidence of data quality rather than the goal. Probing subgroups surfaced the “Marriage Trap” — single minority women are wrongly rejected 9.74× more often, with marriage standing in as a proxy for merit, and every fairness fix trades recall against equity.',
 '04':'“Average” energy profiles hide how differently households actually live. Engineering five features from London smart-meter data and comparing two preprocessing pathways before K-Means resolves 5,556 households into four energy archetypes — and a simple log transform beat Yeo-Johnson on every metric.',
 '05':'Depression screening usually leans on long, intrusive questionnaires. Distilling a 46-feature teacher into a student that reads only 10 non-intrusive behavioral markers lifts held-out recall from 55% to 88% — the distillation transfers the teacher’s decision geometry and quietly acts as a regularizer.',
 '06':'Forecasting next-hour highway traffic means wrestling with noisy, gap-ridden sensor data. A data-centric pipeline — gap-aware windows and cyclical time encoding feeding a SimpleRNN — cuts RMSE 35.6% below linear regression with fewer parameters, and clean data beats dropout.',
 '07':'A reservoir town’s waterline shifts with the seasons — so where does riverside life actually happen on that moving edge? Mining GIS terrain alongside thousands of sampled social-media images maps the water-level fluctuating zone into a data-driven atlas of riverside activity — spatial research done as an architect, before the AI degree.',
 '08':'How do people really live inside East-China high-rises, beyond the show flat? Superimposing and quantifying hundreds of residential floor plans collapses them into a single “ghost” — a density map of doors and stairs that reveals the shared patterns of everyday space.',
 '09':'A 62,000 m² school designed under dense regulatory code and a tight brief, resolved through multi-objective spatial optimization. As project architect I led it from SD through CD and on-site supervision; it was built, awarded First Prize, and published on ArchDaily.',
 '10':'How do you fit winter sport onto a constrained urban site? Stacking ski-jump, rink and training into a vertical “boarding complex” through iterative form-finding turns a small footprint into a section — a schematic tower.'};

    else{a.href=l[2];a.target='_blank';}
    a.appendChild(mkIcon(l[0],13));a.insertAdjacentHTML('beforeend',`<span>${l[1]}${l[0]==='doc'?'':' ↗'}</span>`);pl.appendChild(a);});
  tiles.push({el:card,cat:'_'});
})();

/* hover a project card → its whole project's cards glow lemon */
function hl(pi,on){document.querySelectorAll('[data-pi="'+pi+'"]').forEach(e=>e.classList.toggle('hl',!!on));}
function iconFor(s){s=s.toLowerCase();if(/demo|live/.test(s))return 'play';if(/code|github/.test(s))return 'gh';if(/pdf|report|slides/.test(s))return 'doc';return 'ext';}

/* fold the folder-driven manifest into each project's imgs: the _assets_src folders are the source of
   truth for WHICH files exist & their role (hero/board/gallery); captions stay authored here and are
   matched by filename — a file with no caption simply shows blank. Drop a file in a folder → it appears. */
(function(){if(!window.GALLERY)return;
  P.forEach(p=>{const key=(p.imgs[0]&&(p.imgs[0].i||p.imgs[0].v)||'/x/').split('/')[1];p.key=key;
    const caps={};p.imgs.forEach(m=>{const b=(m.i||m.v).split('/').pop().replace(/\.[^.]+$/,'');caps[b]={cap:m.cap,w:m.w};});
    const list=window.GALLERY[key]||[];
    if(list.length)p.imgs=list.map(e=>{const isV=e.k==='v',path='assets/'+key+'/'+e.f+(isV?'.mp4':'.webp'),meta=caps[e.f]||{};
      const o=isV?{v:path}:{i:path};o.cap=meta.cap||'';if(meta.w)o.w=meta.w;o.r=e.r;return o;});});
})();

/* build project cards + shots */
P.forEach((p,pi)=>{
  const card=document.createElement('div');card.className='card tcard proj';
  card.innerHTML=`<div class="hd"><span class="hemoji">${EMO[p.n]||''}</span><div><div class="tt">${p.t}</div>${SUBS[p.n]?`<div class="sub">${SUBS[p.n]}</div>`:''}</div></div>
    <div class="stack">${p.stack.map(s=>`<span>${s}</span>`).join('')}</div>`;
  card.style.cursor='pointer';card.onclick=()=>{(p.detail==='pdf'&&DOC[p.n])?window.open(DOC[p.n],'_blank'):openGallery(pi,0);};
  card.dataset.pi=pi;card.style.setProperty('--cat',CAT[p.cat].c);card.style.setProperty('--stick',STICK[p.cat]);
  card.addEventListener('mouseenter',()=>hl(pi,1));card.addEventListener('mouseleave',()=>hl(pi,0));
  const defs=projLinks(p);
  if(defs.length){const lk=document.createElement('div');lk.className='links';
    defs.forEach(l=>{const a=document.createElement('a');a.className='icn';const isDoc=(l[1]===DOC[p.n]);
      if(isDoc){a.href='#';a.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();openDoc(pi);});}
      else{a.href=l[1];a.target='_blank';a.addEventListener('click',e=>e.stopPropagation());}
      a.appendChild(mkIcon(iconFor(l[0]),13));a.insertAdjacentHTML('beforeend',`<span>${l[0]}${isDoc?'':' ↗'}</span>`);lk.appendChild(a);});
    card.appendChild(lk);}
  stage.appendChild(card);tiles.push({el:card,cat:p.cat,pi});
  p.imgs.forEach((m,idx)=>{
    if(m.r?m.r==='gallery':m.g)return;          // gallery-only: lives in the gallery, not on the board
    const isHero=m.r==='hero';                  // hero/ folder → biggest
    const el=document.createElement('div');el.className='shot'+(isHero?' hero':'');el.dataset.pi=pi;
    el.dataset.wt=m.v?(isHero?'vh':'v'):(isHero?'h':(m.w||infoWeight(m)));el.style.width=(m.v?VID:WSIZE[el.dataset.wt]||WSIZE[3])+'px';
    if(m.v){const v=document.createElement('video');v.src=encodeURI(m.v);v.muted=true;v.loop=true;v.playsInline=true;v.autoplay=true;v.preload='auto';v.setAttribute('muted','');el.appendChild(v);
      el.dataset.isvid='1';}
    else{const im=document.createElement('img');im.src=encodeURI(m.i);im.alt=m.cap||p.t;el.appendChild(im);}
    if(m.cap){const cp=document.createElement('span');cp.className='shotcap';cp.textContent=m.cap;el.appendChild(cp);}
    el.onclick=()=>openImg(pi,idx);
    stage.appendChild(el);tiles.push({el,cat:p.cat,pi});
  });
});

/* ===== layout — all tiles equal rank, shelf-packed (tight, controlled spacing) ===== */
function rnd(a,b){return a+Math.random()*(b-a);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const ALLOW=14;   // permitted overlap (px) — "一丢丢重叠"
function pack(mode){
  const W=Math.min(stage.clientWidth,1760), M=8;
  const nodes=tiles.map(t=>{
    let w=t.el.offsetWidth||262, h=t.el.offsetHeight||200;
    const med=t.el.querySelector('video,img'), iw=med&&(med.videoWidth||med.naturalWidth), ih=med&&(med.videoHeight||med.naturalHeight);
    const wt=t.el.dataset.wt;
    // shot tile: width from a target AREA + the media's REAL aspect → comparable visual weight per tile
    if(iw&&ih&&wt&&!t.el.dataset.usermoved){w=Math.round(Math.max(MINW,Math.min(MAXW,Math.sqrt(AREA[wt]*iw/ih))));t.el.style.width=w+'px';}
    if(iw&&ih){const cw=w-12; h=Math.round(cw*ih/iw)+12;}                 // 12 = .shot padding(5·2)+border(1·2)
    const isCard=t.el.classList.contains('tcard');
    // ax/ay (the card's top-left anchor offset) is set per-cluster below, ∝ cluster size (no rotation)
    return {el:t.el,w,h,vid:!!t.el.querySelector('video'),card:isCard,ax:0,ay:0,key:(t.pi==null?'_':t.pi),cat:t.cat,rot:0,x:0,y:0};
  });
  // one centre per project (+profile), on a loose jittered field
  let keys=[...new Set(nodes.map(n=>n.key))];
  if(mode==='category'){const rank={'_':-1,'AI':0,'Data & Space':1,'Built':2};const catOf={};nodes.forEach(n=>catOf[n.key]=n.cat);
    keys.sort((a,b)=>(rank[catOf[a]]-rank[catOf[b]])||((a==='_'?-1:a)-(b==='_'?-1:b)));}
  else keys.sort((a,b)=>(a==='_'?-1:a)-(b==='_'?-1:b));   // featured: profile · PRISM(0) · bedroom(1) · then by #
  // each cluster gets ROOM ∝ ITS CONTENT (so PRISM/bedroom — wide videos + UI shots — aren't squeezed into
  // a 3-tile cell). Estimate a box (w×h) from total tile area, then SKYLINE-pack the boxes: organic & compact,
  // each box dropped into the lowest-fitting slot so clusters nest — NOT a rigid grid.
  const area={};nodes.forEach(n=>{area[n.key]=(area[n.key]||0)+n.w*n.h;});
  const dim={}, FILL=0.72, ASP=1.2;
  keys.forEach(k=>{const A=area[k]||40000;dim[k]={w:Math.sqrt(A*ASP/FILL)+12,h:Math.sqrt(A/(ASP*FILL))+12,r:Math.sqrt(A/Math.PI/FILL)};});
  // (no card anchor — with zero overlap the card can sit naturally in the cluster without covering anything)
  const center={}, pad=10, binW=22, nb=Math.max(1,Math.ceil(W/binW)), sky=new Array(nb).fill(96);
  keys.forEach(k=>{const w=dim[k].w,h=dim[k].h,cols=Math.min(nb,Math.max(1,Math.round((w+pad)/binW)));
    let bx=0,bt=Infinity;
    for(let i=0;i+cols<=nb;i++){let t=0;for(let j=i;j<i+cols;j++)if(sky[j]>t)t=sky[j];
      if(t<bt){bt=t;bx=i;}}
    center[k]={x:bx*binW+w/2+rnd(-6,6), y:bt+h/2+rnd(-6,6)};
    for(let j=bx;j<bx+cols&&j<nb;j++)sky[j]=bt+h+pad;});
  // seed each cluster's tiles in a small sunflower disk (INITIAL positions only — the attractor is the centre)
  const byKey={};nodes.forEach(n=>{(byKey[n.key]=byKey[n.key]||[]).push(n);});
  Object.values(byKey).forEach(g=>{shuffle(g);g.forEach((n,k)=>{const a=k*2.399+rnd(0,.6),r=64*Math.sqrt(k);n.x=center[n.key].x+Math.cos(a)*r-n.w/2;n.y=center[n.key].y+Math.sin(a)*r-n.h/2;});});
  const ITERS=520;
  for(let it=0;it<ITERS;it++){
    // pull each tile toward its target (images → cluster centre; the card → top-left anchor) so the cluster
    // self-packs into an organic blob with the card hung off one corner; the long tail (last 180 passes) drops
    // the pull = collision-ONLY cleanup, which fully de-overlaps even the dense video-heavy clusters (PRISM/bedroom)
    const pull=it<ITERS-180?0.05:0;
    if(pull)nodes.forEach(n=>{n.x+=(center[n.key].x+n.ax-(n.x+n.w/2))*pull;n.y+=(center[n.key].y+n.ay-(n.y+n.h/2))*pull;});
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      let dx=(b.x+b.w/2)-(a.x+a.w/2), dy=(b.y+b.h/2)-(a.y+a.h/2);
      const ox=(a.w+b.w)/2-Math.abs(dx), oy=(a.h+b.h)/2-Math.abs(dy);
      // NO overlap anywhere — every tile keeps a clear gap (same project 8px, across projects 18px).
      const al = (a.key===b.key) ? -4 : -12;
      if(ox>al&&oy>al){                                         // push apart RADIALLY (along centre-line) — organic, no axis-snapping
        let len=Math.hypot(dx,dy); if(len<0.5){dx=rnd(-1,1);dy=rnd(-1,1);len=Math.hypot(dx,dy)||1;}
        const pen=(Math.min(ox,oy)-al)*0.5, ux=dx/len, uy=dy/len;
        a.x-=ux*pen;a.y-=uy*pen;b.x+=ux*pen;b.y+=uy*pen;
      }
    }
  }
  let maxY=0;
  nodes.forEach(n=>{n.x=Math.max(M,Math.min(W-n.w-M,n.x));n.y=Math.max(72,n.y);
    n.el.style.display='';n.el.style.left=n.x+'px';n.el.style.top=n.y+'px';n.el.style.transform=`rotate(${n.rot}deg)`;
    n.el.style.opacity='1';n.el.style.pointerEvents='';
    n.el.style.zIndex=n.el.classList.contains('tcard')?80:20;maxY=Math.max(maxY,n.y+n.h);});
  // keep profile + Résumé as a clean LEFT-ALIGNED vertical stack (CV directly below profile)
  const pc=stage.querySelector('.tcard.profile'),cc=stage.querySelector('.tcard.cvcard');
  if(pc&&cc){const px=parseFloat(pc.style.left)||0,py=parseFloat(pc.style.top)||0;
    cc.style.left=px+'px';cc.style.top=(py+pc.offsetHeight+16)+'px';
    maxY=Math.max(maxY,py+pc.offsetHeight+16+cc.offsetHeight);}
  stage.style.height=(maxY+120)+'px';
}
/* tidy view — file every key-image into its project card (folder feel) */
function tidy(){
  const W=Math.min(stage.clientWidth,1760), cardW=230, gap=36;
  const cols=W<560?1:Math.max(1,Math.floor((W+gap)/(cardW+gap))), gridW=cols*cardW+(cols-1)*gap, x0=(W-gridW)/2;
  const cards=tiles.filter(t=>t.el.classList.contains('tcard')).sort((a,b)=>((a.pi==null?-1:a.pi)-(b.pi==null?-1:b.pi)));
  const colH=new Array(cols).fill(92);
  cards.forEach(t=>{
    let c=0;for(let i=1;i<cols;i++)if(colH[i]<colH[c])c=i;
    const cw=t.el.offsetWidth, x=x0+c*(cardW+gap)+(cardW-cw)/2, y=colH[c];   // centre each card in its column → even gaps
    t.el.style.left=x+'px';t.el.style.top=y+'px';t.el.style.transform='rotate(0deg)';t.el.style.zIndex=80;t.el.style.opacity='1';
    tiles.forEach(s=>{if(s.el.classList.contains('tcard'))return;if(s.el.dataset.pi!=t.pi)return;
      s.el.style.display='none';s.el.style.opacity='0';s.el.style.pointerEvents='none';});
    colH[c]+=t.el.offsetHeight+gap;
  });
  stage.style.height=(Math.max(...colH)+120)+'px';
}
/* narrow / phone — a single vertical information flow: profile · about · then each project,
   card followed by its full-width media, in reading order (the board melts into a column) */
function flow(){
  const W=stage.clientWidth, colW=Math.min(W-24,460), cx=W/2;
  let y=84;
  tiles.forEach(t=>{const el=t.el, isImg=el.classList.contains('shot');
    if(isImg)el.style.width=colW+'px';
    const w=el.offsetWidth;
    el.style.left=(cx-w/2)+'px';el.style.top=y+'px';el.style.transform='rotate(0deg)';
    el.style.display='';el.style.opacity='1';el.style.pointerEvents='';el.style.zIndex=isImg?20:80;
    y+=el.offsetHeight+16;
  });
  stage.style.height=(y+70)+'px';
}
function whenReady(cb){
  const media=stage.querySelectorAll('img,video');let n=media.length;if(!n)return cb();
  let done=false;const fin=()=>{if(--n<=0&&!done){done=true;cb();}};
  media.forEach(m=>{if(m.tagName==='IMG'){m.complete?fin():(m.addEventListener('load',fin),m.addEventListener('error',fin));}
    else{m.readyState>=1?fin():(m.addEventListener('loadedmetadata',fin),m.addEventListener('error',fin));}});
  setTimeout(()=>{if(!done){done=true;cb();}},4500);
}

/* gallery */
const gov=document.getElementById('gov'),gwrap=document.getElementById('gwrap');
// shared header (title + P/A/R + role + stack + links; PDF link opens the in-page doc view)
function headBody(p){const pi=+p.n-1;
  const links=projLinks(p).map(l=> l[1]===DOC[p.n]
    ? `<a href="#" onclick="openDoc(${pi});return false;">${l[0]}</a>`
    : `<a href="${l[1]}" target="_blank">${l[0]} ↗</a>`).join('');
  return `<div><h2>${p.t}</h2>${SUBS[p.n]?`<div class="gsub">${SUBS[p.n]}</div>`:''}<div class="gi">${DESC[p.n]||p.intro}</div><div class="grole">Role · ${ROLES[p.n]}</div>
    <div class="gstack">${p.stack.map(s=>`<span>${s}</span>`).join('')}</div>
    ${links?`<div class="glinks">${links}</div>`:''}</div>`;}
function openGallery(pi,start){
  curSingle=null;
  const p=P[pi];
  const figs=p.imgs.map((m,i)=>{const inner=m.v?`<video src="${encodeURI(m.v)}" muted loop autoplay playsinline></video>`:`<img src="${encodeURI(m.i)}" loading="lazy" alt="${(m.cap||p.t).replace(/"/g,'&quot;')}">`;
    return `<figure class="gfig" id="gf${i}" onclick="openImg(${pi},${i})"><div class="gimg">${inner}</div>${m.cap?`<figcaption>${m.cap}</figcaption>`:''}</figure>`;}).join('');
  // append the full slides / report inline, after the curated figures (lazy-loaded so it stays light)
  let docsec='';
  if(DOC[p.n]){const np=DOCPAGES[p.n]||0;let pages='';
    for(let i=1;i<=np;i++)pages+=`<img class="docpg" src="docs/pages/${p.n}/${String(i).padStart(2,'0')}.webp" loading="lazy" alt="page ${i}">`;
    docsec=`<div class="gdocsec" id="gdocsec"><div class="gdivider">Full ${p.n==='06'?'report':'slides'} · ${np} pages ↓</div><div class="gdoc">${pages}</div></div>`;}
  gwrap.innerHTML=`<div class="ghead"></div><div class="gfigs">`+figs+`</div>`+docsec;
  const gh=gwrap.querySelector('.ghead');gh.insertAdjacentHTML('beforeend','<span class="gemoji">'+(EMO[p.n]||'')+'</span>');gh.insertAdjacentHTML('beforeend',headBody(p));
  // the header Slides/Report link now scrolls down to the inline pages (no separate view)
  const dl=gh.querySelector('.glinks a[onclick*="openDoc"]');
  if(dl)dl.onclick=e=>{e.preventDefault();const s=document.getElementById('gdocsec');if(s)s.scrollIntoView({behavior:'smooth'});};
  gov.classList.add('open');document.body.style.overflow='hidden';gov.scrollTop=0;
  setTimeout(()=>{const t=document.getElementById('gf'+start);if(t&&start)t.scrollIntoView({block:'center'});},60);
}
// in-page document view — gallery-like header on top, embedded PDF below (no navigation)
function openDoc(pi){
  curSingle=null;
  const p=P[pi], np=DOCPAGES[p.n]||0; let pages='';
  for(let i=1;i<=np;i++)pages+=`<img class="docpg" src="docs/pages/${p.n}/${String(i).padStart(2,'0')}.webp" loading="lazy" alt="page ${i}">`;
  gwrap.innerHTML=`<div class="ghead"></div><div class="gdoc">${pages}</div>`;
  const gh=gwrap.querySelector('.ghead');gh.insertAdjacentHTML('beforeend','<span class="gemoji">'+(EMO[p.n]||'')+'</span>');gh.insertAdjacentHTML('beforeend',headBody(p));
  gov.classList.add('open');document.body.style.overflow='hidden';gov.scrollTop=0;
}
let curSingle=null;   // {pi,idx,n} when the single-image view is open (drives ←/→ keys)
function openImg(pi,idx){
  const p=P[pi], m=p.imgs[idx], n=p.imgs.length;curSingle={pi,idx,n};
  const media=m.v?`<video src="${encodeURI(m.v)}" muted loop autoplay playsinline></video>`:`<img src="${encodeURI(m.i)}" alt="${(m.cap||p.t).replace(/"/g,'&quot;')}">`;
  gwrap.innerHTML=`<div class="single"><div class="simg">${media}</div>
    ${m.cap?`<div class="scap">${m.cap}</div>`:''}
    <div class="sfoot"><span class="sp">${p.t}</span><span>${idx+1} / ${n}</span>
      <span class="slinks"><a href="#" onclick="openGallery(${pi},${idx});return false;">view all ▦</a>${DOC[p.n]?` · <a href="#" onclick="openDoc(${pi});return false;">↳ Slides</a>`:''}</span></div></div>
    ${n>1?`<button class="snav-side prev" aria-label="previous" onclick="openImg(${pi},${(idx-1+n)%n})">◂</button><button class="snav-side next" aria-label="next" onclick="openImg(${pi},${(idx+1)%n})">▸</button>`:''}`;
  gov.classList.add('open');document.body.style.overflow='hidden';gov.scrollTop=0;
}
function openCV(){   // CV embedded in-page (no new tab); iframe always reflects the current PDF
  curSingle=null;
  gwrap.innerHTML=`<div class="cvwrap"><iframe class="cvframe" src="docs/Wang_Haocheng_CV.pdf#view=FitH" title="CV — Wang Haocheng"></iframe></div>`;
  gov.classList.add('open');document.body.style.overflow='hidden';gov.scrollTop=0;
}
function closeG(){gov.classList.remove('open');document.body.style.overflow='';curSingle=null;}
gov.addEventListener('click',e=>{if(e.target===gov)closeG();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeG();return;}
  if(curSingle&&gov.classList.contains('open')){const{pi,idx,n}=curSingle;
    if(e.key==='ArrowLeft'){e.preventDefault();openImg(pi,(idx-1+n)%n);}
    else if(e.key==='ArrowRight'){e.preventDefault();openImg(pi,(idx+1)%n);}}
});

/* controls */
let mode='featured';
const NARROW=700;                    // below this the board melts into a vertical flow
function apply(m){mode=m;
  document.getElementById('bTidy').classList.toggle('on',m==='tidy');
  if(stage.clientWidth<NARROW){tidy();return;}   // phones/narrow: tidy card list — tap a card → its gallery + slides
  if(m==='tidy')tidy();else pack(m);}
document.getElementById('bTidy').onclick=()=>apply(mode==='tidy'?'featured':'tidy');

/* autoplay videos/gifs, but only while on screen (battery / perf friendly, works on mobile) */
const vio=new IntersectionObserver(es=>es.forEach(e=>{e.isIntersecting?e.target.play().catch(()=>{}):e.target.pause();}),{rootMargin:'150px'});
stage.querySelectorAll('video').forEach(v=>vio.observe(v));
/* re-pack once media reports its TRUE size — videos report dimensions late, so an early layout would
   pack them with wrong heights and they'd overlap; this corrects the layout the moment sizes are known */
let mt;const relayout=()=>{clearTimeout(mt);mt=setTimeout(()=>apply(mode),130);};
stage.querySelectorAll('video').forEach(v=>v.addEventListener('loadeddata',relayout));
stage.querySelectorAll('img').forEach(im=>{if(!im.complete)im.addEventListener('load',relayout);});
/* opening animation — place instantly (no slide-from-corner), then a staggered top-down rise+fade */
let entranced=false;
function entrance(){
  if(entranced)return;entranced=true;
  stage.classList.add('booting');void stage.offsetWidth;   // snap to packed positions, kill the slide
  const t=[...stage.querySelectorAll('.card,.shot')].filter(el=>el.style.opacity!=='0').sort((a,b)=>(a.offsetTop-b.offsetTop)||(a.offsetLeft-b.offsetLeft));
  t.forEach((el,i)=>{el.style.animationDelay=(i*20)+'ms';el.classList.add('anim-in');
    el.addEventListener('animationend',()=>{el.classList.remove('anim-in');el.style.animationDelay='';},{once:true});});
  stage.classList.remove('booting');
}
whenReady(()=>{apply('featured');entrance();});    // default: featured order — PRISM + My Little Bedroom lead
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>apply(mode),200);});
</script>
